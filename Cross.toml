[target.aarch64-unknown-linux-gnu]
# Built in CI by scripts/ci/build_cross_aarch64_jammy_image.sh (Ubuntu 22.04 base) so glibc matches Jammy vcpkg artifacts.
# Local: run that script once, or remove this `image =` line to use cross-rs default (older glibc).
image = "cross-aarch64-jammy:local"
# Use pre-build to install dependencies for ARM64 inside the cross container
pre-build = [
    "dpkg --add-architecture arm64",
    "echo 'Acquire::Retries \"3\";' > /etc/apt/apt.conf.d/80-retries",
    "apt-get update",
    "apt-get install --assume-yes --fix-missing pkg-config libasound2-dev:arm64 libxkbcommon-dev:arm64 libxcb-render0-dev:arm64 libxcb-shape0-dev:arm64 libxcb-xfixes0-dev:arm64 libfontconfig1-dev:arm64"
]

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "echo 'Acquire::Retries \"3\";' > /etc/apt/apt.conf.d/80-retries",
    "apt-get update",
    "apt-get install --assume-yes --fix-missing pkg-config nasm libasound2-dev libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev"
]
