name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: SimpleImageViewer
            archive_ext: .tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: SimpleImageViewer
            archive_ext: .tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: SimpleImageViewer.exe
            archive_ext: .zip
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: SimpleImageViewer
            archive_ext: .zip
            use_cross: false
          - os: macos-latest # compile intel binary from the arm runner
            target: x86_64-apple-darwin
            binary_name: SimpleImageViewer
            archive_ext: .zip
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
        if: "!matrix.use_cross"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release (Cross)
        uses: cross-rs/cross-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release
        if: matrix.use_cross

      - name: Build Release (Native)
        run: cargo build --release --target ${{ matrix.target }}
        if: "!matrix.use_cross"

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          $binarySrc = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          Compress-Archive -Path $binarySrc, README.md, README_CN.md, LICENSE -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHIVE_NAME="SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} .
          zip $ARCHIVE_NAME ${{ matrix.binary_name }} README.md README_CN.md LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCHIVE_NAME="SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} .
          tar -czvf $ARCHIVE_NAME ${{ matrix.binary_name }} README.md README_CN.md LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload binary to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binary
          path: ${{ env.ARCHIVE_NAME }}

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ env.ARCHIVE_NAME }}
