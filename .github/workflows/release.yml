name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LIBRAW_VERSION: "0.22.1"
  LIBRAW_INSTALL_DIR: "3rdparty/LibRaw"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: SimpleImageViewer
            archive_ext: .tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: SimpleImageViewer
            archive_ext: .tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: SimpleImageViewer.exe
            archive_ext: .zip
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: SimpleImageViewer.exe
            archive_ext: .zip
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: SimpleImageViewer
            archive_ext: .zip
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: SimpleImageViewer
            archive_ext: .zip
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup LibRaw (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -L https://www.libraw.org/data/LibRaw-${{ env.LIBRAW_VERSION }}.tar.gz -o libraw.tar.gz
          tar -xzf libraw.tar.gz
          mkdir -p ${{ env.LIBRAW_INSTALL_DIR }}
          cp -r LibRaw-${{ env.LIBRAW_VERSION }}/* ${{ env.LIBRAW_INSTALL_DIR }}/

      - name: Setup LibRaw (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.libraw.org/data/LibRaw-${{ env.LIBRAW_VERSION }}.zip" -OutFile "libraw.zip"
          Expand-Archive libraw.zip -DestinationPath .
          if (Test-Path "${{ env.LIBRAW_INSTALL_DIR }}") { Remove-Item "${{ env.LIBRAW_INSTALL_DIR }}" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "${{ env.LIBRAW_INSTALL_DIR }}"
          Move-Item LibRaw-${{ env.LIBRAW_VERSION }}/* ${{ env.LIBRAW_INSTALL_DIR }}/ -Force

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
        if: "!matrix.use_cross"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release (Cross)
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --target ${{ matrix.target }}

      - name: Build Release (Native)
        run: cargo build --release --target ${{ matrix.target }}
        if: "!matrix.use_cross"

      - name: Run SIMD Parity Tests (Cross)
        if: matrix.use_cross
        run: cross test --release --target ${{ matrix.target }} simd_swizzle

      - name: Run SIMD Parity Tests (Native)
        if: "!matrix.use_cross && matrix.target != 'aarch64-pc-windows-msvc'"
        run: cargo test --release --target ${{ matrix.target }} simd_swizzle

      - name: Check glibc compatibility
        if: runner.os == 'Linux'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if [ -f "$BINARY" ]; then
            echo "Checking glibc version requirements for $BINARY"
            # Extract highest GLIBC version from symbol versions
            MAX_GLIBC=$(strings "$BINARY" | grep "^GLIBC_2" | sort -V | tail -n 1)
            echo "Maximum GLIBC version required: $MAX_GLIBC"
            # Also show shared library dependencies
            readelf -d "$BINARY" | grep NEEDED || true
          else
            echo "Binary not found at $BINARY"
          fi

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          $binarySrc = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          mkdir staging/assets
          cp $binarySrc, README.md, README_CN.md, LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          Compress-Archive -Path staging/* -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHIVE_NAME="SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          mkdir -p staging/assets
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cp README.md README_CN.md LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          cd staging && zip -r ../$ARCHIVE_NAME . && cd ..
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCHIVE_NAME="SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          mkdir -p staging/assets
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cp README.md README_CN.md LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          tar -czvf $ARCHIVE_NAME -C staging .
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  build-legacy-win7:
    name: Build (Win7 x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup LibRaw (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.libraw.org/data/LibRaw-${{ env.LIBRAW_VERSION }}.zip" -OutFile "libraw.zip"
          Expand-Archive libraw.zip -DestinationPath .
          if (Test-Path "${{ env.LIBRAW_INSTALL_DIR }}") { Remove-Item "${{ env.LIBRAW_INSTALL_DIR }}" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "${{ env.LIBRAW_INSTALL_DIR }}"
          Move-Item LibRaw-${{ env.LIBRAW_VERSION }}/* ${{ env.LIBRAW_INSTALL_DIR }}/ -Force

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: win7-legacy-x64

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1



      - name: Download VC-LTL5 and YY-Thunks
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/VC-LTL5/releases/download/v5.3.1/VC-LTL-Binary.7z" -OutFile "VC-LTL.7z"
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/YY-Thunks/releases/download/v1.2.1-Beta.2/YY-Thunks-Lib.zip" -OutFile "YY-Thunks-Lib.zip"
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/YY-Thunks/releases/download/v1.2.1-Beta.2/YY-Thunks-Objs.zip" -OutFile "YY-Thunks-Objs.zip"
          
          7z x VC-LTL.7z -oVC-LTL5
          Expand-Archive -Path YY-Thunks-Lib.zip -DestinationPath YY-Thunks -Force
          Expand-Archive -Path YY-Thunks-Objs.zip -DestinationPath YY-Thunks -Force
          
          echo "VC_LTL=$pwd\VC-LTL5" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "YY_THUNKS=$pwd\YY-Thunks" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install thunk-cli
        run: cargo install thunk-cli

      - name: Build with thunks
        shell: pwsh
        env:
          VC_LTL: ${{ env.VC_LTL }}
          YY_THUNKS: ${{ env.YY_THUNKS }}
        run: |
          $env:RUSTFLAGS = "-C link-arg=/SUBSYSTEM:WINDOWS"
          thunk --os win7 --arch x64 -- --release --features legacy_win7



      - name: Package Artifacts
        shell: pwsh
        run: |
          $archiveName = "SimpleImageViewer-win7-x64.zip"
          $binarySrc = "target/win7_build/x86_64-pc-windows-msvc/release/SimpleImageViewer.exe"
          mkdir staging/assets
          cp $binarySrc, README.md, README_CN.md, LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          cp "$env:SystemRoot\System32\d3dcompiler_47.dll" staging/
          # 仅针对 Win7 额外增加 ANGLE 核心 DLL 探测 (从 Chrome 中提取)
          $angleDll = Get-ChildItem -Path "C:\Program Files\Google\Chrome\Application" -Filter "libEGL.dll" -Recurse | Select-Object -First 1
          if ($angleDll) {
              $anglePath = $angleDll.DirectoryName
              cp "$anglePath\libEGL.dll" staging/
              cp "$anglePath\libGLESv2.dll" staging/
              echo "Bundled ANGLE runtime from $anglePath"
          }
          Compress-Archive -Path staging/* -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-win7-x64
          path: ${{ env.ARCHIVE_NAME }}

  create-release:
    name: Create Release
    needs: [build, build-legacy-win7]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest
        env:
          OUTPUT: CHANGELOG.md

      - name: Debug Changelog
        run: |
          echo "=== CHANGELOG CONTENT START ==="
          cat CHANGELOG.md
          echo "=== CHANGELOG CONTENT END ==="

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} release-artifacts/* \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md || \
          (gh release edit ${{ github.ref_name }} --notes-file CHANGELOG.md && \
           gh release upload ${{ github.ref_name }} release-artifacts/* --clobber)
