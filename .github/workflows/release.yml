name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: siv
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: siv.exe
            archive_ext: .zip
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: siv
            archive_ext: .zip
          - os: macos-13 # older macos for intellectual compat, though aarch64 is better. 
            target: x86_64-apple-darwin
            binary_name: siv
            archive_ext: .zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Relese
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "siv-${{ matrix.target }}${{ matrix.archive_ext }}"
          $binarySrc = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          Compress-Archive -Path $binarySrc, README.md, README_CN.md, LICENSE -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHIVE_NAME="siv-${{ matrix.target }}${{ matrix.archive_ext }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} .
          zip $ARCHIVE_NAME ${{ matrix.binary_name }} README.md README_CN.md LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCHIVE_NAME="siv-${{ matrix.target }}${{ matrix.archive_ext }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} .
          tar -czvf $ARCHIVE_NAME ${{ matrix.binary_name }} README.md README_CN.md LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ env.ARCHIVE_NAME }}
