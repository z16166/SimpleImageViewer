name: Release

on:
  push:
    tags:
      - "v*"
  # Manually retry the full pipeline (e.g. after transient vcpkg/network failures).
  # Leave "Release tag" empty to only build artifacts for the selected branch.
  # Set it to e.g. v2.0.0 to build that tag and create/update the GitHub Release.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Create GitHub Release for this tag (e.g. v2.0.0). Leave empty for build-only."
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  # When dispatching manually with release_tag set, checkout and release use that tag; otherwise use the triggering ref.
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MONKEY_SDK_VERSION: "1270"
  MONKEY_SDK_DIR: "3rdparty/monkey-sdk"
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  # vcpkg configuration is handled via vcpkg.json and vcpkg-configuration.json
jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: SimpleImageViewer
            archive_ext: .tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: SimpleImageViewer
            archive_ext: .tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: SimpleImageViewer.exe
            archive_ext: .zip
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: SimpleImageViewer.exe
            archive_ext: .zip
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: SimpleImageViewer
            archive_ext: .zip
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: SimpleImageViewer
            archive_ext: .zip
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Export vcpkg triplet
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            if [[ "${{ matrix.target }}" == "x86_64"* ]]; then echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" >> $GITHUB_ENV;
            elif [[ "${{ matrix.target }}" == "i686"* ]]; then echo "VCPKG_DEFAULT_TRIPLET=x86-windows-static" >> $GITHUB_ENV;
            elif [[ "${{ matrix.target }}" == "aarch64"* ]]; then echo "VCPKG_DEFAULT_TRIPLET=arm64-windows-static" >> $GITHUB_ENV; fi
          elif [[ "${{ matrix.target }}" == *"apple-darwin"* ]]; then
            if [[ "${{ matrix.target }}" == "x86_64"* ]]; then echo "VCPKG_DEFAULT_TRIPLET=x64-osx" >> $GITHUB_ENV;
            elif [[ "${{ matrix.target }}" == "aarch64"* ]]; then echo "VCPKG_DEFAULT_TRIPLET=arm64-osx" >> $GITHUB_ENV; fi
          elif [[ "${{ matrix.target }}" == *"linux"* ]]; then
            if [[ "${{ matrix.target }}" == "x86_64"* ]]; then echo "VCPKG_DEFAULT_TRIPLET=x64-linux" >> $GITHUB_ENV;
            elif [[ "${{ matrix.target }}" == "aarch64"* ]]; then 
              echo "VCPKG_DEFAULT_TRIPLET=arm64-linux" >> $GITHUB_ENV;
              echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV;
              echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV;
            fi
          fi

      - name: Install cross-compiler (Ubuntu ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          
      - name: Configure CMake Toolchain (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cat <<EOF > arm64-toolchain.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          EOF
          echo "VCPKG_CHAINLOAD_TOOLCHAIN_FILE=${GITHUB_WORKSPACE}/arm64-toolchain.cmake" >> $GITHUB_ENV

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: false
          vcpkgJsonGlob: 'vcpkg.json'
          vcpkgConfigurationJsonGlob: 'vcpkg-configuration.json'

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "Running vcpkg install inside ubuntu:20.04 container to ensure low glibc requirement..."
            # Adjust the toolchain file path for the container
            DOCKER_TOOLCHAIN=""
            if [[ -n "$VCPKG_CHAINLOAD_TOOLCHAIN_FILE" ]]; then
              DOCKER_TOOLCHAIN="/work/arm64-toolchain.cmake"
            fi
            
            # Change permissions so Docker doesn't create root-owned cache files that fail later steps
            mkdir -p vcpkg_installed
            chmod -R 777 vcpkg_installed

            # APT needs focal-updates + focal-security; transient mirror failures omit those repos and yield fake "broken packages".
            # Logic lives in scripts/ci/vcpkg_inner_focal.sh (retries + fail on partial "Failed to fetch").
            docker run --rm \
              -v "${{ github.workspace }}:/work" \
              -v "$VCPKG_ROOT:/vcpkg" \
              -w /work \
              -e "VCPKG_DEFAULT_TRIPLET=${VCPKG_DEFAULT_TRIPLET}" \
              -e "VCPKG_CHAINLOAD_TOOLCHAIN_FILE=${DOCKER_TOOLCHAIN}" \
              ubuntu:20.04 \
              bash /work/scripts/ci/vcpkg_inner_focal.sh
          else
            echo "DEBUG: Current PWD is $(pwd)"
            echo "DEBUG: GITHUB_WORKSPACE is $GITHUB_WORKSPACE"
            echo "DEBUG: Checking overlay directory existence:"
            ls -la "$(pwd)/vcpkg-overlays" || echo "Directory not found!"
            vcpkg install --triplet="$VCPKG_DEFAULT_TRIPLET" --overlay-ports="$(pwd)/vcpkg-overlays"
          fi

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-${{ matrix.target }}-glibc231-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ matrix.target }}-glibc231-

      - name: Setup Monkey's Audio SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://monkeysaudio.com/files/MAC_${{ env.MONKEY_SDK_VERSION }}_SDK.zip" -OutFile "monkey_sdk.zip"
          Expand-Archive monkey_sdk.zip -DestinationPath "temp_monkey"
          if (!(Test-Path "${{ env.MONKEY_SDK_DIR }}")) { New-Item -ItemType Directory -Force -Path "${{ env.MONKEY_SDK_DIR }}" }
          Copy-Item -Path "temp_monkey/*" -Destination "${{ env.MONKEY_SDK_DIR }}/" -Recurse -Force

      - name: Setup Monkey's Audio SDK (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          curl -L https://monkeysaudio.com/files/MAC_${{ env.MONKEY_SDK_VERSION }}_SDK.zip -o monkey_sdk.zip
          unzip monkey_sdk.zip -d temp_monkey
          mkdir -p ${{ env.MONKEY_SDK_DIR }}
          cp -rn temp_monkey/* ${{ env.MONKEY_SDK_DIR }}/

      - name: Export NASM path for build scripts
        shell: bash
        run: |
          NASM_BIN=$(which nasm || which nasm.exe || echo "")
          if [ -n "$NASM_BIN" ]; then
            echo "NASM=$NASM_BIN" >> $GITHUB_ENV
            echo "NASM set to $NASM_BIN"
            nasm -v
          else
            echo "ERROR: nasm not found in PATH after setup" && exit 1
          fi

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
        if: "!matrix.use_cross"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release (Cross)
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --target ${{ matrix.target }}

      - name: Build Release (Native)
        if: "!matrix.use_cross"
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Run SIMD Parity Tests (Cross)
        if: matrix.use_cross
        run: cross test --release --target ${{ matrix.target }} simd_swizzle

      - name: Run SIMD Parity Tests (Native)
        if: "!matrix.use_cross && matrix.target != 'aarch64-pc-windows-msvc'"
        run: cargo test --release --target ${{ matrix.target }} simd_swizzle

      - name: Check glibc compatibility
        if: runner.os == 'Linux'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if [ -f "$BINARY" ]; then
            echo "Checking glibc version requirements for $BINARY"
            # Extract highest GLIBC version from symbol versions
            MAX_GLIBC=$(strings "$BINARY" | grep "^GLIBC_2" | sort -V | tail -n 1)
            echo "Maximum GLIBC version required: $MAX_GLIBC"
            # Also show shared library dependencies
            readelf -d "$BINARY" | grep NEEDED || true
          else
            echo "Binary not found at $BINARY"
          fi

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          $binarySrc = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          mkdir staging/assets
          cp $binarySrc, README.md, README_CN.md, LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          Compress-Archive -Path staging/* -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHIVE_NAME="SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          mkdir -p staging/assets
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cp README.md README_CN.md LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          cd staging && zip -r ../$ARCHIVE_NAME . && cd ..
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCHIVE_NAME="SimpleImageViewer-${{ matrix.target }}${{ matrix.archive_ext }}"
          mkdir -p staging/assets
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cp README.md README_CN.md LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          tar -czvf $ARCHIVE_NAME -C staging .
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

      - name: Archive PDB symbols (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pdbPath = "target/${{ matrix.target }}/release/SimpleImageViewer.pdb"
          if (Test-Path $pdbPath) {
            $zipName = "SimpleImageViewer-${{ matrix.target }}-pdb.zip"
            Compress-Archive -Path $pdbPath -DestinationPath $zipName
            echo "PDB_ZIP=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Upload PDB artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pdb-${{ matrix.target }}
          path: ${{ env.PDB_ZIP }}
          if-no-files-found: warn

  build-legacy-win7:
    name: Build (Win7 x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Export NASM path for build scripts
        shell: bash
        run: |
          NASM_BIN=$(which nasm.exe 2>/dev/null || which nasm 2>/dev/null || echo "")
          if [ -n "$NASM_BIN" ]; then
            echo "NASM=$NASM_BIN" >> $GITHUB_ENV
            nasm -v
          else
            echo "ERROR: nasm not found" && exit 1
          fi


      - name: Export vcpkg triplet
        shell: bash
        run: echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" >> $GITHUB_ENV

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: false
          vcpkgJsonGlob: 'vcpkg.json'
          vcpkgConfigurationJsonGlob: 'vcpkg-configuration.json'

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          echo "DEBUG: Current PWD is $(pwd)"
          echo "DEBUG: GITHUB_WORKSPACE is $GITHUB_WORKSPACE"
          echo "DEBUG: Checking overlay directory existence:"
          ls -la "$(pwd)/vcpkg-overlays" || echo "Directory not found!"
          vcpkg install --triplet="$VCPKG_DEFAULT_TRIPLET" --overlay-ports="$(pwd)/vcpkg-overlays" --overlay-triplets="$(pwd)/vcpkg-overlays/triplets"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-win7-legacy-x64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Setup Monkey's Audio SDK (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://monkeysaudio.com/files/MAC_${{ env.MONKEY_SDK_VERSION }}_SDK.zip" -OutFile "monkey_sdk.zip"
          Expand-Archive monkey_sdk.zip -DestinationPath "temp_monkey"
          if (!(Test-Path "${{ env.MONKEY_SDK_DIR }}")) { New-Item -ItemType Directory -Force -Path "${{ env.MONKEY_SDK_DIR }}" }
          Copy-Item -Path "temp_monkey/*" -Destination "${{ env.MONKEY_SDK_DIR }}/" -Recurse -Force

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: win7-legacy-x64

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1



      - name: Download VC-LTL5 and YY-Thunks
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/VC-LTL5/releases/download/v5.3.1/VC-LTL-Binary.7z" -OutFile "VC-LTL.7z"
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/YY-Thunks/releases/download/v1.2.1-Beta.2/YY-Thunks-Lib.zip" -OutFile "YY-Thunks-Lib.zip"
          Invoke-WebRequest -Uri "https://github.com/Chuyu-Team/YY-Thunks/releases/download/v1.2.1-Beta.2/YY-Thunks-Objs.zip" -OutFile "YY-Thunks-Objs.zip"
          
          7z x VC-LTL.7z -oVC-LTL5
          Expand-Archive -Path YY-Thunks-Lib.zip -DestinationPath YY-Thunks -Force
          Expand-Archive -Path YY-Thunks-Objs.zip -DestinationPath YY-Thunks -Force
          
          echo "VC_LTL=$pwd\VC-LTL5" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "YY_THUNKS=$pwd\YY-Thunks" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install thunk-cli
        run: cargo install thunk-cli

      - name: Build with thunks
        shell: pwsh
        env:
          VC_LTL: ${{ env.VC_LTL }}
          YY_THUNKS: ${{ env.YY_THUNKS }}
        run: |
          $env:RUSTFLAGS = "-C target-feature=+crt-static -C link-arg=/SUBSYSTEM:WINDOWS"
          thunk --os win7 --arch x64 -- --release --features legacy_win7



      - name: Package Artifacts
        shell: pwsh
        run: |
          $archiveName = "SimpleImageViewer-win7-x64.zip"
          $binarySrc = "target/win7_build/x86_64-pc-windows-msvc/release/SimpleImageViewer.exe"
          mkdir staging/assets
          cp $binarySrc, README.md, README_CN.md, LICENSE staging/
          cp assets/screenshot.jpg staging/assets/
          cp "$env:SystemRoot\System32\d3dcompiler_47.dll" staging/
          # 仅针对 Win7 额外增加 ANGLE 核心 DLL 探测 (从 Chrome 中提取)
          $angleDll = Get-ChildItem -Path "C:\Program Files\Google\Chrome\Application" -Filter "libEGL.dll" -Recurse | Select-Object -First 1
          if ($angleDll) {
              $anglePath = $angleDll.DirectoryName
              cp "$anglePath\libEGL.dll" staging/
              cp "$anglePath\libGLESv2.dll" staging/
              echo "Bundled ANGLE runtime from $anglePath"
          }
          Compress-Archive -Path staging/* -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-win7-x64
          path: ${{ env.ARCHIVE_NAME }}

      - name: Archive PDB symbols (Win7)
        shell: pwsh
        run: |
          $pdbPath = "target/win7_build/x86_64-pc-windows-msvc/release/SimpleImageViewer.pdb"
          if (Test-Path $pdbPath) {
            $zipName = "SimpleImageViewer-win7-x64-pdb.zip"
            Compress-Archive -Path $pdbPath -DestinationPath $zipName
            echo "PDB_ZIP=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Upload PDB artifact (Win7)
        uses: actions/upload-artifact@v4
        with:
          name: pdb-win7-x64
          path: ${{ env.PDB_ZIP }}
          if-no-files-found: warn

  create-release:
    name: Create Release
    needs: [build, build-legacy-win7]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Extract Release Notes
        shell: bash
        run: |
          # Get version without 'v' prefix
          VERSION=${RELEASE_TAG#v}
          echo "Extracting notes for version [$VERSION]"
          
          # Extract section between the current version header and the next ## header
          # We use sed to find the range, then sed '$d' to remove the last line (the next header)
          # If it's the first entry in CHANGELOG, it will go to the end of file.
          sed -n "/^## \[$VERSION\]/,/^## /p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md
          
          echo "=== RELEASE NOTES CONTENT ==="
          cat RELEASE_NOTES.md
          echo "============================="

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          gh release create "${RELEASE_TAG}" release-artifacts/* \
            --title "${RELEASE_TAG}" \
            --notes-file RELEASE_NOTES.md || \
          (gh release edit "${RELEASE_TAG}" --notes-file RELEASE_NOTES.md && \
           gh release upload "${RELEASE_TAG}" release-artifacts/* --clobber)
