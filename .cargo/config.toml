# Cargo config for SimpleImageViewer
# Applied automatically when building in this workspace.

# ── Windows MSVC: static-link the CRT (no VCRUNTIME*.dll dependency) ──────────
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
