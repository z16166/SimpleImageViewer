# macOS Deployment Target Configuration
# Sets the minimum supported version to macOS 11.0 (Big Sur)

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=11.0"
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=11.0"
]

# Linux Compatibility Note:
# To ensure compatibility with older Linux distributions (e.g. Ubuntu 20.04+),
# it is recommended to build the application on a system with an older GLIBC version.
