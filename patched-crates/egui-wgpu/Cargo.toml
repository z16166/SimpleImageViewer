[package]
edition = "2024"
rust-version = "1.92"
name = "egui-wgpu"
version = "0.34.1"
authors = [
    "Nils Hasenbanck <nils@hasenbanck.de>",
    "embotech <opensource@embotech.com>",
    "Emil Ernerfeldt <emil.ernerfeldt@gmail.com>",
]
build = false
include = [
    "../../LICENSE-APACHE",
    "../../LICENSE-MIT",
    "**/*.rs",
    "**/*.wgsl",
    "Cargo.toml",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Bindings for using egui natively using the wgpu library"
homepage = "https://github.com/emilk/egui/tree/main/crates/egui-wgpu"
readme = "README.md"
keywords = [
    "wgpu",
    "egui",
    "gui",
    "gamedev",
]
categories = [
    "gui",
    "game-development",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/emilk/egui/tree/main/crates/egui-wgpu"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--generate-link-to-definition"]

[features]
capture = ["dep:egui"]
default = [
    "fragile-send-sync-non-atomic-wasm",
    "macos-window-resize-jitter-fix",
]
fragile-send-sync-non-atomic-wasm = ["wgpu/fragile-send-sync-non-atomic-wasm"]
macos-window-resize-jitter-fix = ["wgpu/metal"]
wayland = ["winit?/wayland"]
winit = [
    "dep:winit",
    "winit/rwh_06",
    "dep:egui",
    "capture",
]
x11 = ["winit?/x11"]

[lib]
name = "egui_wgpu"
path = "src/lib.rs"

[dependencies.ahash]
version = "0.8.12"
features = [
    "no-rng",
    "std",
]
default-features = false

[dependencies.bytemuck]
version = "1.24.0"

[dependencies.document-features]
version = "0.2.11"

[dependencies.egui]
version = "0.34.1"
optional = true
default-features = false

[dependencies.epaint]
version = "0.34.1"
features = ["bytemuck"]
default-features = false

[dependencies.log]
version = "0.4.28"
features = ["std"]

[dependencies.profiling]
version = "1.0.17"
default-features = false

[dependencies.thiserror]
version = "2.0.17"

[dependencies.type-map]
version = "0.5.1"

[dependencies.web-time]
version = "1.1.0"

[dependencies.wgpu]
version = "29.0.1"
features = [
    "std",
    "wgsl",
    # Enable DX12 HAL access so the patched Windows-only code in `winit.rs`
    # can reach into the DXGI swap chain via `wgpu::Surface::as_hal` to
    # update the swap-chain color space after a format hot-swap. The `dx12`
    # feature compiles to a no-op on non-Windows targets, so keeping it
    # unconditional keeps the patched crate portable.
    "dx12",
]
default-features = false

# Windows-only: we need raw DXGI access (IDXGISwapChain3::SetColorSpace1) to
# keep the swap-chain color space in sync with its format whenever the app
# hot-swaps between an SDR `Bgra8Unorm` and an HDR scRGB `Rgba16Float`
# surface. `ResizeBuffers` inside wgpu-hal does not update the color space,
# so we do it here by reaching into the DX12 hal surface.
[target.'cfg(windows)'.dependencies.windows]
# Must match the `windows` major version that `wgpu-hal` uses internally, so
# that the `IDXGISwapChain3` COM pointer returned by `hal_surface.swap_chain()`
# speaks the same type system as the `DXGI_COLOR_SPACE_TYPE` we pass to it.
# `wgpu-hal 29.0.1` depends on `windows = "0.62"`.
version = "0.62"
features = [
    "Win32_Foundation",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
]

[dependencies.winit]
version = "0.30.13"
optional = true
default-features = false

